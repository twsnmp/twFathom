name: Build and Release twFathom

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-windows:
    name: Package App (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          python -m pip install briefcase wheel

      - name: Pre-build Dependency Wheels (Avoid proxy-tools blocker)
        run: |
          mkdir -p wheels
          python -m pip wheel proxy-tools --wheel-dir=wheels

      - name: Briefcase Create (Scaffold Build Environment)
        run: |
          export PIP_FIND_LINKS="$(pwd)/wheels"
          python -m briefcase create --no-input

      - name: Briefcase Build
        run: |
          export PIP_FIND_LINKS="$(pwd)/wheels"
          python -m briefcase build --no-input

      - name: Briefcase Package (Create Installer)
        run: |
          export PIP_FIND_LINKS="$(pwd)/wheels"
          python -m briefcase package --no-input

      - name: Rename and Prepare Artifact
        shell: pwsh
        run: |
          $filePath = Resolve-Path "build/twfathom/windows/msi/*.msi" | Select-Object -ExpandProperty Path -First 1
          Copy-Item $filePath -Destination "twFathom-Windows.msi"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twFathom-Windows.msi
          path: twFathom-Windows.msi

  package-linux:
    name: Package App (Linux)
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux Only)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            python3-pip \
            python3-venv \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-3.0 \
            libgirepository1.0-dev \
            libcairo2-dev \
            pkg-config \
            libwebkit2gtk-4.0-dev \
            desktop-file-utils

      - name: Install Briefcase
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --break-system-packages briefcase wheel

      - name: Pre-build Dependency Wheels (Avoid proxy-tools blocker)
        run: |
          mkdir -p wheels
          python3 -m pip wheel proxy-tools --wheel-dir=wheels

      - name: Briefcase Create (Scaffold Build Environment)
        run: |
          export PIP_FIND_LINKS="$(pwd)/wheels"
          python3 -m briefcase create linux appimage --no-docker --no-input

      - name: Briefcase Build
        run: |
          export PIP_FIND_LINKS="$(pwd)/wheels"
          python3 -m briefcase build linux appimage --no-docker --no-input

      - name: Briefcase Package (Create Installer)
        run: |
          export PIP_FIND_LINKS="$(pwd)/wheels"
          python3 -m briefcase package linux appimage --no-docker --no-input

      - name: Rename and Prepare Artifact
        run: |
          file_path=$(ls dist/*.AppImage | head -n 1)
          cp "$file_path" "twFathom-Linux.AppImage"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twFathom-Linux.AppImage
          path: twFathom-Linux.AppImage

  release:
    name: Create GitHub Release
    needs: [package-windows, package-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: twFathom-Windows.msi
          path: ./

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: twFathom-Linux.AppImage
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            twFathom-Windows.msi
            twFathom-Linux.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
