name: Build and Release twFathom

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-path: "build/twfathom/windows/msi/*.msi"
            artifact-name: "twFathom-Windows.msi"
            python-version: '3.11'
          - os: macos-13 # Standard intel/arm universal macOS runner
            artifact-path: "build/twfathom/macos/app/twFathom-*.dmg"
            artifact-name: "twFathom-macOS.dmg"
            python-version: '3.11'
          - os: ubuntu-22.04
            artifact-path: "build/twfathom/linux/appimage/*.AppImage"
            artifact-name: "twFathom-Linux.AppImage"
            python-version: '3.10.12'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.os != 'ubuntu-22.04'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            python3-pip \
            python3-venv \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-3.0 \
            libgirepository1.0-dev \
            libcairo2-dev \
            pkg-config \
            libwebkit2gtk-4.0-dev \
            desktop-file-utils

      - name: Install Briefcase
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            python3 -m pip install --upgrade pip
            python3 -m pip install --break-system-packages briefcase wheel
          else
            python -m pip install --upgrade pip
            python -m pip install briefcase wheel
          fi

      - name: Pre-build Dependency Wheels (Avoid proxy-tools blocker)
        shell: bash
        run: |
          mkdir -p wheels
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            python3 -m pip wheel proxy-tools --wheel-dir=wheels
          else
            python -m pip wheel proxy-tools --wheel-dir=wheels
          fi

      - name: Briefcase Create (Scaffold Build Environment)
        shell: bash
        run: |
          export PIP_FIND_LINKS="$(pwd)/wheels"
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            python3 -m briefcase create --no-input
          else
            python -m briefcase create --no-input
          fi
 
      - name: Briefcase Build
        shell: bash
        run: |
          export PIP_FIND_LINKS="$(pwd)/wheels"
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            python3 -m briefcase build --no-input
          else
            python -m briefcase build --no-input
          fi
 
      - name: Briefcase Package (Create Installer)
        shell: bash
        run: |
          export PIP_FIND_LINKS="$(pwd)/wheels"
          if [ "${{ matrix.os }}" = "macos-13" ]; then
            python -m briefcase package --adhoc-sign --no-input
          elif [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            python3 -m briefcase package --no-input
          else
            python -m briefcase package --no-input
          fi

      - name: Rename and Prepare Artifact (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # Find created package and copy it to a standardized filename
          file_path=$(ls ${{ matrix.artifact-path }} | head -n 1)
          cp "$file_path" "${{ matrix.artifact-name }}"

      - name: Rename and Prepare Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $filePath = Resolve-Path "build/twfathom/windows/msi/*.msi" | Select-Object -ExpandProperty Path -First 1
          Copy-Item $filePath -Destination "twFathom-Windows.msi"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}

  release:
    name: Create GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: twFathom-Windows.msi
          path: ./

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: twFathom-macOS.dmg
          path: ./

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: twFathom-Linux.AppImage
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            twFathom-Windows.msi
            twFathom-macOS.dmg
            twFathom-Linux.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
