<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>twFathom - Dashboard</title>
    <link rel="stylesheet" href="../common/css/theme.css">
    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
        }

        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .kpi-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--card-accent, var(--color-primary));
        }

        .kpi-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }

        .kpi-value {
            font-family: var(--font-outfit);
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .kpi-unit {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 4px;
        }

        .charts-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            flex-grow: 1;
        }

        .chart-box {
            min-height: 380px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .chart-title {
            font-family: var(--font-outfit);
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-canvas {
            flex-grow: 1;
            width: 100%;
            height: 320px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
            box-shadow: 0 0 8px var(--color-success);
        }

        .status-dot.offline {
            background: var(--text-muted);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="header animate-fade-in">
        <div>
            <h1 id="source-name"><span class="title-gradient">ロード中...</span></h1>
            <p id="source-desc" style="color: var(--text-secondary); font-size: 12px; margin-top: 4px;"></p>
        </div>
        <div class="status-pill">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">リアルタイム同期中</span>
        </div>
    </div>

    <!-- Dynamic KPI Cards -->
    <div id="kpi-list" class="kpi-container animate-fade-in" style="animation-delay: 0.1s;">
        <!-- Filled dynamically -->
    </div>

    <!-- Charts Section -->
    <div class="charts-container animate-fade-in" style="animation-delay: 0.2s;">
        <div class="glass-card chart-box">
            <div class="chart-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3v18h18"></path><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"></path></svg>
                <span id="chart-main-title">時系列推移</span>
            </div>
            <div id="main-chart" class="chart-canvas"></div>
        </div>
    </div>

    <!-- Include ECharts from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
