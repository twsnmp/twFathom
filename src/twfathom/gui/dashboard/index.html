<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>twFathom - Dashboard</title>
    <link rel="stylesheet" href="../common/css/theme.css">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: var(--font-inter);
            padding: 16px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
        }

        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .kpi-card {
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            overflow: hidden;
            padding: 10px 12px;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--card-accent, var(--color-primary));
        }

        .kpi-title {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }

        .kpi-value {
            font-family: var(--font-outfit);
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .kpi-unit {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 2px;
        }

        .charts-container {
            flex-grow: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .chart-box {
            flex-grow: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .chart-title {
            font-family: var(--font-outfit);
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .chart-canvas {
            flex-grow: 1;
            min-height: 0;
            width: 100%;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 4px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
            box-shadow: 0 0 8px var(--color-success);
        }

        .status-dot.offline {
            background: var(--text-muted);
            box-shadow: none;
        }

        /* Large screens scaling */
        @media (min-width: 800px) and (min-height: 600px) {
            body {
                padding: 24px;
            }
            .header {
                margin-bottom: 24px;
            }
            .header h1 {
                font-size: 24px;
            }
            .kpi-container {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 20px;
                margin-bottom: 24px;
            }
            .kpi-card {
                padding: 24px;
                gap: 8px;
            }
            .kpi-title {
                font-size: 11px;
            }
            .kpi-value {
                font-size: 32px;
            }
            .kpi-unit {
                font-size: 14px;
                margin-left: 4px;
            }
            .chart-box {
                padding: 24px;
            }
            .chart-title {
                font-size: 16px;
                margin-bottom: 16px;
            }
            .status-pill {
                padding: 6px 12px;
                font-size: 13px;
            }
        }

        /* Custom Pill Selector for switching secondary Y axis data */
        .pill-selector {
            display: inline-flex;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            padding: 2px;
            gap: 2px;
        }

        .pill-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: var(--font-inter);
            outline: none;
        }

        .pill-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
        }

        .pill-btn.active {
            background: var(--color-primary-gradient);
            color: #050508;
            box-shadow: 0 2px 8px rgba(0, 210, 255, 0.2);
        }
        
        @media (min-width: 800px) and (min-height: 600px) {
            .pill-btn {
                padding: 6px 14px;
                font-size: 12px;
            }
        }

        /* Resize Handles styles */
        .resize-handle-r {
            position: absolute;
            right: 0;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: e-resize;
            z-index: 9999;
        }
        
        .resize-handle-b {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 6px;
            cursor: s-resize;
            z-index: 9999;
        }
        
        .resize-handle-br {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 14px;
            height: 14px;
            cursor: se-resize;
            z-index: 10000;
            background: linear-gradient(135deg, transparent 70%, rgba(255, 255, 255, 0.15) 70%);
        }
    </style>
</head>
<body>
    <div class="header animate-fade-in pywebview-drag-region">
        <div>
            <h1 id="source-name"><span class="title-gradient">ロード中...</span></h1>
            <p id="source-desc" style="color: var(--text-secondary); font-size: 12px; margin-top: 4px;"></p>
        </div>
        <div class="status-pill">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">リアルタイム同期中</span>
        </div>
    </div>

    <!-- Dynamic KPI Cards -->
    <div id="kpi-list" class="kpi-container animate-fade-in" style="animation-delay: 0.1s;">
        <!-- Filled dynamically -->
    </div>

    <!-- Charts Section -->
    <div class="charts-container animate-fade-in" style="animation-delay: 0.2s;">
        <div class="glass-card chart-box">
            <div class="chart-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0; gap: 16px;">
                <div class="chart-title" style="margin-bottom: 0;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3v18h18"></path><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"></path></svg>
                    <span id="chart-main-title">時系列推移</span>
                </div>
                <div id="chart-controls"></div>
            </div>
            <div id="main-chart" class="chart-canvas"></div>
        </div>
    </div>

    <!-- Resize Handles -->
    <div id="resize-r" class="resize-handle-r"></div>
    <div id="resize-b" class="resize-handle-b"></div>
    <div id="resize-br" class="resize-handle-br"></div>

    <!-- Include ECharts from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
